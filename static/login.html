<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="/static/icon.png">
<link rel="apple-touch-icon" href="/static/icon.png">
<title>BMO 登录</title>
<style>
  :root {
    --bg: #f5f6f4;
    --panel: #ffffff;
    --line: #dcded9;
    --accent: #3f6f66;
    --accent-soft: #e6efeb;
    --text: #252923;
    --muted: #6f756d;
    --err: #b35b55;
  }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif;
         background: var(--bg); color: var(--text); display: flex; align-items: center;
         justify-content: center; min-height: 100vh; margin: 0; font-size: 14px; }
  .box { background: var(--panel); border: 1px solid var(--line); padding: 32px;
         border-radius: 8px; min-width: 320px; box-shadow: 0 4px 18px rgba(0,0,0,0.06); }
  h1 { margin: 0 0 20px; font-size: 18px; font-weight: 600; }
  input { width: 100%; padding: 9px 11px; font-size: 14px; border-radius: 5px;
          border: 1px solid var(--line); background: #fff; color: var(--text);
          box-sizing: border-box; margin-bottom: 14px; }
  input:focus { outline: none; border-color: #8aa69d;
                box-shadow: 0 0 0 2px rgba(63,111,102,0.12); }
  button { width: 100%; padding: 9px; font-size: 14px; border-radius: 5px;
           border: 1px solid #bfd3cc; background: var(--accent-soft); color: #254f47;
           cursor: pointer; }
  button:hover { background: #dceae5; }
  .err { color: var(--err); margin-top: 12px; min-height: 18px; font-size: 13px; }
</style>
</head>
<body>
  <div class="box">
    <h1>BMO 控制台</h1>
    <input type="password" id="pw" placeholder="请输入访问密码" autofocus>
    <button onclick="login()">登录</button>
    <div class="err" id="err"></div>
  </div>
<script>
const LANG = localStorage.getItem('bmo_lang')
  || ((navigator.language || 'zh').toLowerCase().startsWith('zh') ? 'zh' : 'en');
const I18N_EN = {
  "BMO 登录": "BMO Login",
  "BMO 控制台": "BMO Console",
  "请输入访问密码": "Enter access password",
  "登录": "Login",
  "密码错误": "Incorrect password",
};
function tr(s) {
  if (LANG !== 'en' || s == null) return s;
  return I18N_EN[s] || s;
}
function applyLang() {
  if (LANG !== 'en') return;
  document.documentElement.lang = 'en';
  document.title = tr('BMO 登录');
  document.querySelector('h1').textContent = tr('BMO 控制台');
  document.getElementById('pw').placeholder = tr('请输入访问密码');
  document.querySelector('button').textContent = tr('登录');
}
async function login() {
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  err.textContent = '';
  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pw}),
    });
    if (r.ok) { location.replace('/?_=' + Date.now()); }
    else { err.textContent = tr('密码错误'); }
  } catch (e) { err.textContent = e.message; }
}
document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
applyLang();
</script>
</body>
</html>
